<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamingHub • Seriale</title>
  <style>
    :root {
      --bg: #0b0d10;
      --card: #151922;
      --muted: #9fb1d9;
      --text: #e3e7ee;
      --brand: #4f7cff;
      --border: #232a37;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
      line-height: 1.3;
    }

    a { color: var(--text); text-decoration: none; }

    header {
      position: sticky;
      top: 0;
      background: rgba(11, 13, 16, 0.85);
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 16px;
      gap: 12px;
    }

    .brand {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
    }

    input[type="search"] {
      flex: 1;
      background: #0e1218;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 340px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .menu a {
      color: var(--muted);
      font-size: 0.95rem;
      transition: color 0.2s;
    }

    .menu a:hover { color: #fff; }

    .btn {
      background: var(--brand);
      color: #fff;
      padding: 8px 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
    }

    .btn:hover { background: #668cff; }

    .btn.secondary { background: #2a3446; }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 16px;
    }

    /* FILTRY */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
    }

    .filters .field {
      flex: 1 1 180px;
      display: flex;
      flex-direction: column;
    }

    .filters label {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    select, input[type="number"], input[type="text"] {
      background: #0e1218;
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      width: 100%;
      transition: border-color 0.2s;
    }

    select:focus, input:focus {
      outline: none;
      border-color: var(--brand);
    }

    .filters .actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    /* GRID */
    .grid {
      margin-top: 20px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(5, 1fr);
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .card .p {
      padding: 10px 12px;
    }

    .card .title {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .card .meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .no-results {
      text-align: center;
      color: var(--muted);
      margin-top: 30px;
    }

    footer {
      color: var(--muted);
      text-align: center;
      padding: 30px 0;
      font-size: 0.9rem;
    }

    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(1, 1fr); }
    }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a class="brand" href="index.html">🎬 <span>StreamingHub</span></a>
    <input type="search" id="globalSearch" placeholder="Szukaj seriali..." />
    <nav class="menu" id="menu">
      <a href="filmy.html">Filmy</a>
      <a href="seriale.html" style="color:#fff;">Seriale</a>
      <a href="index.html#me">Moja biblioteka</a>
      <div id="authBtns">
        <a href="index.html" class="btn secondary">Zaloguj się</a>
        <a href="register.html" class="btn">Zarejestruj</a>
      </div>
    </nav>
  </div>
</header>

<main class="container">
  <h2>Filtruj</h2>

  <div class="filters">
    <div class="field">
      <label for="cat">Kategoria</label>
      <select id="cat">
        <option value="">—</option>
      </select>
    </div>

    <div class="field">
      <label for="year">Rok</label>
      <input type="number" id="year" placeholder="np. 2023">
    </div>

    <div class="field">
      <label for="minLength">Min. długość (min)</label>
      <input type="number" id="minLength" placeholder="np. 60">
    </div>

    <div class="field">
      <label for="sort">Sortowanie</label>
      <select id="sort">
        <option value="newest">Najnowsze</option>
        <option value="oldest">Najstarsze</option>
        <option value="az">A–Z</option>
        <option value="za">Z–A</option>
      </select>
    </div>

    <div class="field">
      <label for="search">Szukaj tytułu</label>
      <input type="text" id="search" placeholder="np. The Boys">
    </div>

    <div class="actions">
      <button class="btn" onclick="UI.apply()">Szukaj</button>
      <button class="btn secondary" onclick="UI.clearFilters()">Wyczyść</button>
    </div>
  </div>

  <div class="grid" id="list"></div>
</main>

<footer>
  © <script>document.write(new Date().getFullYear())</script> StreamingHub
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://jjmnacolebxsifmnmqks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbW5hY29sZWJ4c2lmbW5tcWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU3OTcyNDQsImV4cCI6MjA3MTM3MzI0NH0.1hNoBQ4wDuA_t_vscorQ6FRb-aW8IxHEDxuZKEhndv0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function getCategories() {
  const { data } = await db.from("categories").select("*").order("name");
  return data || [];
}

async function getSeries(filters = {}) {
  let q = db.from("series").select("*").order("created_at", { ascending: false });
  if (filters.category_id) q = q.eq("category_id", filters.category_id);
  if (filters.year) q = q.eq("year", filters.year);
  if (filters.minLength) q = q.gte("duration", filters.minLength);
  if (filters.search) q = q.ilike("title", `%${filters.search}%`);
  if (filters.sort === "oldest") q = q.order("year", { ascending: true });
  else if (filters.sort === "az") q = q.order("title", { ascending: true });
  else if (filters.sort === "za") q = q.order("title", { ascending: false });
  return (await q).data || [];
}

const UI = {
  async init() {
    const cats = await getCategories();
    document.getElementById("cat").innerHTML += cats.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
    const series = await getSeries();
    this.render(series);
  },

  async apply() {
    const filters = {
      category_id: document.getElementById("cat").value || null,
      year: document.getElementById("year").value || null,
      minLength: document.getElementById("minLength").value || null,
      sort: document.getElementById("sort").value || "newest",
      search: document.getElementById("search").value || null
    };
    const s = await getSeries(filters);
    this.render(s);
  },

  clearFilters() {
    ["cat","year","minLength","search","sort"].forEach(id => document.getElementById(id).value = id === "sort" ? "newest" : "");
    this.apply();
  },

  render(series) {
    const list = document.getElementById("list");
    if (!series.length) {
      list.innerHTML = `<div class="no-results">Brak wyników</div>`;
      return;
    }
    list.innerHTML = series.map(s => `
      <div class="card">
        <img src="${s.thumb}" alt="${s.title}">
        <div class="p">
          <div class="title">${s.title}</div>
          <div class="meta">${s.year || ""}</div>
        </div>
      </div>
    `).join("");
  }
};

UI.init();
</script>
</body>
</html>
