<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamingHub • Seriale</title>
  <style>
    :root{--bg:#0b0d10;--card:#151922;--text:#e3e7ee;--muted:#a8bfe2;--brand:#4f7cff;--border:#232a37}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto}
    a{color:var(--text);text-decoration:none}
    .container{max-width:1100px;margin:0 auto;padding:16px}
    header{position:sticky;top:0;background:rgba(11,13,16,.8);backdrop-filter:blur(6px);z-index:10}
    .nav{display:flex;gap:12px;align-items:center;padding:12px 16px}
    .brand{font-weight:800}
    .nav input[type=search]{flex:1;background:#0e1218;border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:12px}
    .menu a,.menu button{padding:8px 10px;color:var(--muted);background:none;border:none;cursor:pointer}
    .btn{background:var(--brand);color:#fff;padding:10px 14px;border-radius:12px;border:none;cursor:pointer}
    .btn.secondary{background:#2a3446}
    .badge{font-size:12px;color:#fff;background:#2a3446;padding:2px 8px;border-radius:999px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .card.p{padding:12px;border:0}
    .card img{width:100%;height:200px;object-fit:cover;display:block}
    .small{font-size:12px;color:var(--muted)}
    .alert{background:#152031;padding:10px;border-radius:10px;color:#0e1218;margin:8px 0}
    .flex{display:flex;gap:12px;align-items:center}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .mt-2{margin-top:8px}.mt-4{margin-top:16px}.mt-8{margin-top:32px}
    textarea,input,select{width:100%;padding:10px;background:#0e1218;border:1px solid var(--border);color:#fff;border-radius:10px}
    footer{color:var(--muted);text-align:center;padding:30px 0}
    .hidden{display:none}
  </style>
</head>
<body>

<header>
  <div class="nav container">
    <a class="brand" href="index.html">🎬 StreamingHub</a>
    <form onsubmit="event.preventDefault(); UI.search(this.q.value)" style="flex:1">
      <input type="search" name="q" placeholder="Szukaj seriali…" />
    </form>
    <nav class="menu flex">
      <a href="index.html">Filmy</a>
      <a href="seriale.html">Seriale</a>
      <a href="index.html#me">Moja biblioteka</a>
      <a href="index.html">Zaloguj się</a>
    </nav>
  </div>
</header>

<main class="container" id="app"></main>

<footer>© <script>document.write(new Date().getFullYear())</script> StreamingHub</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://jjmnacolebxsifmnmqks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// pobieranie seriali
async function getSeries(filters = {}) {
  let q = db.from("series").select("*");
  if(filters.q) q = q.ilike("title", `%${filters.q}%`);
  if(filters.category_id) q = q.eq("category_id", filters.category_id);
  if(filters.year) q = q.eq("year", filters.year);
  if(filters.min_duration) q = q.gte("duration", filters.min_duration);
  if(filters.sort === "new") q = q.order("created_at", { ascending: false });
  else q = q.order("created_at", { ascending: false });
  const { data, error } = await q;
  if(error) throw error;
  return data || [];
}

// kategorie
async function getCategories() {
  const { data, error } = await db.from("categories").select("*").order("name");
  if(error) throw error;
  return data || [];
}

const UI = {
  el: () => document.getElementById("app"),

  async showHome() {
    const cats = await getCategories();
    const series = await getSeries({ sort: "new" });
    const app = UI.el();

    app.innerHTML = `
      ${UI.filters(cats)}
      <section class="section mt-8">
        <div class="flex" style="justify-content:space-between">
          <h2>Nowo dodane seriale</h2>
          <a class="small" href="#" onclick="UI.search('', {sort:'new'})">Najświeższe →</a>
        </div>
        <div class="grid">
          ${series.map(s=>UI.card(s)).join("")}
        </div>
      </section>
    `;
  },

  filters(categories) {
    return `
      <section class="section mt-8">
        <h2>Filtruj</h2>
        <form class="form" onsubmit="event.preventDefault(); UI.search(this.q.value, {
          category_id:this.cat.value||null,
          year:this.year.value||null,
          min_duration:this.len.value||null,
          sort:this.sort.value
        })">
          <div class="row">
            <div>
              <label>Kategoria</label>
              <select name="cat">
                <option value="">—</option>
                ${categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>Rok</label>
              <input type="number" name="year">
            </div>
          </div>
          <div class="row">
            <div>
              <label>Min. długość (min)</label>
              <input type="number" name="len">
            </div>
            <div>
              <label>Sortowanie</label>
              <select name="sort">
                <option value="new">Najnowsze</option>
              </select>
            </div>
          </div>
          <label>Szukaj</label>
          <input type="text" name="q" placeholder="Tytuł...">
          <button class="btn mt-4">Szukaj</button>
        </form>
      </section>`;
  },

  card(s) {
    return `<div class="card">
      <a href="#"><img src="${s.thumb}" alt="${s.title}"></a>
      <div class="card p">
        <strong>${s.title}</strong>
        <div class="small mt-2">czas: ${s.duration||"?"} min • rok: ${s.year||"?"}</div>
      </div>
    </div>`;
  },

  async search(q, extra = {}) {
    const cats = await getCategories();
    const series = await getSeries({ q, ...extra });
    const app = UI.el();
    app.innerHTML = UI.filters(cats) + `
      <h3 class="mt-4">Wyniki</h3>
      <div class="grid">
        ${series.map(s=>UI.card(s)).join("") || '<div class="small">Brak wyników.</div>'}
      </div>
    `;
  }
};

// start
UI.showHome();
</script>
</body>
</html>
