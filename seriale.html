<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamingHub • Odcinki</title>
  <style>
    :root {
      --bg: #0b0d10;
      --card: #151922;
      --muted: #9fb1d9;
      --text: #e3e7ee;
      --brand: #4f7cff;
      --border: #232a37;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto;
      line-height: 1.4;
    }

    header {
      position: sticky;
      top: 0;
      background: rgba(11, 13, 16, 0.85);
      backdrop-filter: blur(6px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px 16px;
      gap: 12px;
    }

    .brand { font-weight: 700; color: var(--text); text-decoration: none; }
    .btn {
      background: var(--brand);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background .2s;
    }
    .btn:hover { background: #678aff; }
    .btn.secondary { background: #2a3446; }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 16px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--muted);
      font-size: 0.95rem;
      text-decoration: none;
      transition: color .2s;
    }
    .back:hover { color: var(--text); }

    .title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .desc {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 20px;
    }

    .seasons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }

    .season-btn {
      background: #11141b;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }

    .season-btn:hover,
    .season-btn.active {
      background: var(--brand);
      border-color: var(--brand);
    }

    .episodes {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .episode {
      background: var(--card);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .episode:hover { background: #1c2332; }

    .episode-title { font-weight: 700; font-size: 1rem; }
    .episode-desc { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    iframe {
      width: 100%;
      height: 500px;
      border: none;
      border-radius: 12px;
      margin-top: 20px;
      background: #0e1218;
    }

    .player-section {
      background: var(--card);
      padding: 16px;
      border-radius: 12px;
      margin-top: 25px;
    }

    .player-info {
      margin-top: 10px;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .no-results { color: var(--muted); text-align: center; margin-top: 30px; }
  </style>
</head>
<body>

<header>
  <div class="nav">
    <a class="brand" href="index.html">🎬 StreamingHub</a>
    <div id="authBtns"></div>
  </div>
</header>

<main class="container" id="app" style="display:none;">
  <a href="seriale.html" class="back">← Powrót do listy</a>
  <div id="seriesInfo"></div>

  <h3>Sezony</h3>
  <div id="seasons" class="seasons"></div>

  <div id="episodes" class="episodes"></div>

  <div id="playerSection" class="player-section" style="display:none;">
    <iframe id="player" allowfullscreen></iframe>
    <div id="episodeInfo" class="player-info"></div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://jjmnacolebxsifmnmqks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbW5hY29sZWJ4c2lmbW5tcWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU3OTcyNDQsImV4cCI6MjA3MTM3MzI0NH0.1hNoBQ4wDuA_t_vscorQ6FRb-aW8IxHEDxuZKEhndv0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const urlParams = new URLSearchParams(window.location.search);
const seriesId = urlParams.get("id");

// 🔒 Sprawdzenie logowania
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (!session || !session.user) {
    alert("Musisz być zalogowany, aby oglądać seriale!");
    location.href = "index.html";
    return;
  }

  document.getElementById("app").style.display = "block";
  const authBtns = document.getElementById("authBtns");
  authBtns.innerHTML = `<button class="btn secondary" onclick="logout()">Wyloguj</button>`;

  loadSeries();
})();

async function logout() {
  await db.auth.signOut();
  location.href = "index.html";
}

// 📺 Główne funkcje
async function loadSeries() {
  const { data: series } = await db.from("series").select("*").eq("id", seriesId).single();
  if (!series) return;

  document.getElementById("seriesInfo").innerHTML = `
    <div class="title">${series.title}</div>
    <div class="desc">${series.description || "Brak opisu"}</div>
  `;

  const { data: seasons } = await db.from("seasons").select("*").eq("series_id", seriesId).order("season_number");
  renderSeasons(seasons);
}

function renderSeasons(seasons) {
  const container = document.getElementById("seasons");
  if (!seasons?.length) {
    container.innerHTML = "<div class='no-results'>Brak sezonów</div>";
    return;
  }

  container.innerHTML = "";
  seasons.forEach(season => {
    const btn = document.createElement("button");
    btn.className = "season-btn";
    btn.textContent = season.title || `Sezon ${season.season_number}`;
    btn.onclick = () => {
      document.querySelectorAll(".season-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      loadEpisodes(season.id);
    };
    container.appendChild(btn);
  });
}

async function loadEpisodes(seasonId) {
  const { data: episodes } = await db.from("episodes")
    .select("*")
    .eq("season_id", seasonId)
    .order("episode_number");

  const list = document.getElementById("episodes");
  if (!episodes?.length) {
    list.innerHTML = "<div class='no-results'>Brak odcinków w tym sezonie</div>";
    return;
  }

  list.innerHTML = "";
  episodes.forEach(ep => {
    const div = document.createElement("div");
    div.className = "episode";
    div.innerHTML = `
      <div class="episode-title">Odcinek ${ep.episode_number}: ${ep.title}</div>
      <div class="episode-desc">${ep.description || ""}</div>
    `;
    div.onclick = () => playEpisode(ep);
    list.appendChild(div);
  });
}

function playEpisode(ep) {
  const playerSection = document.getElementById("playerSection");
  const player = document.getElementById("player");
  const info = document.getElementById("episodeInfo");

  player.src = ep.iframe_url;
  info.innerHTML = `<strong>${ep.title}</strong><br>${ep.description || ""}`;
  playerSection.style.display = "block";

  window.scrollTo({ top: playerSection.offsetTop - 60, behavior: "smooth" });
}
</script>
</body>
</html>
