<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Znajomi • StreamingHub</title>
  <style>
    :root {
      --bg: #0b0d10;
      --card: #151922;
      --text: #e3e7ee;
      --muted: #a8bfe2;
      --brand: #4f7cff;
      --border: #232a37;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto;
      min-height: 100vh;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 16px; }
    header {
      position: sticky;
      top: 0;
      background: rgba(11, 13, 16, .8);
      backdrop-filter: blur(6px);
      z-index: 10;
    }
    .nav { display: flex; gap: 12px; align-items: center; padding: 12px 16px; }
    .brand { font-weight: 800; }
    .menu a, .menu button {
      padding: 8px 10px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
    }
    .btn {
      background: var(--brand);
      color: #fff;
      padding: 8px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }
    .btn.secondary { background: #2a3446; }
    .btn.danger { background: #c24b4b; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
    }
    .friend-item {
      background: #0e1218;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .friend-info { display: flex; flex-direction: column; }
    .muted { color: var(--muted); font-size: 13px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
<header>
  <div class="nav container">
    <a class="brand" href="filmy.html">🎬 StreamingHub</a>
    <nav class="menu" style="margin-left:auto">
      <a href="filmy.html">Filmy</a>
      <a href="seriale.html">Seriale</a>
      <a href="top.html">TOP</a>
      <a href="moja-biblioteka.html">Moja biblioteka</a>
      <a href="znajomi.html" style="color:#fff">Znajomi</a>
      <button onclick="logout()" class="btn secondary">Wyloguj</button>
    </nav>
  </div>
</header>

<main class="container">
  <h1>👥 Znajomi</h1>

  <!-- Kod znajomego -->
  <section class="card">
    <h2>🔑 Twój kod znajomego</h2>
    <p class="muted">Udostępnij go, aby inni mogli Cię dodać.</p>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <input type="text" id="friendCode" readonly style="flex:1;">
      <button class="btn secondary" onclick="copyCode()">📋 Skopiuj</button>
      <button class="btn danger" onclick="changeCode()">🔄 Zmień kod</button>
    </div>
    <hr style="margin:20px 0; border-color:var(--border)">
    <h3>➕ Dodaj znajomego po kodzie</h3>
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
      <input type="text" id="addCodeInput" placeholder="Wpisz kod znajomego" style="flex:1;">
      <button class="btn" onclick="addFriend()">Wyślij zaproszenie</button>
    </div>
    <p id="addMessage" class="muted"></p>
  </section>

  <!-- Zaproszenia -->
  <section class="card">
    <h2>📩 Zaproszenia</h2>
    <div id="requestsList">Ładowanie...</div>
  </section>

  <!-- Znajomi -->
  <section class="card">
    <h2>📜 Twoi znajomi</h2>
    <div id="friendsList">Ładowanie...</div>
  </section>
</main>

<footer style="text-align:center;margin:40px 0;color:var(--muted);">
  © <script>document.write(new Date().getFullYear())</script> StreamingHub
</footer>

<script>
const db = supabase.createClient(
  "https://jjmnacolebxsifmnmqks.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbW5hY29sZWJ4c2lmbW5tcWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU3OTcyNDQsImV4cCI6MjA3MTM3MzI0NH0.1hNoBQ4wDuA_t_vscorQ6FRb-aW8IxHEDxuZKEhndv0"
);
let currentUser = null;

(async()=>{
  const { data:{ session } } = await db.auth.getSession();
  if(!session) return location.href="login.html";
  currentUser = session.user;

  await loadFriendCode();
  await loadRequests();
  await loadFriends();
})();

/* TWÓJ KOD */
async function loadFriendCode(){
  const { data } = await db.from("profiles").select("friend_code").eq("id", currentUser.id).maybeSingle();
  document.getElementById("friendCode").value = data?.friend_code || "Brak";
}

function copyCode(){
  const code = document.getElementById("friendCode").value;
  navigator.clipboard.writeText(code);
  alert("Skopiowano kod znajomego ✅");
}

/* ZMIANA KODU */
async function changeCode(){
  if(!confirm("Czy na pewno chcesz zmienić swój kod znajomego?")) return;
  const newCode = Math.random().toString(36).substring(2,10);
  await db.from("profiles").update({ friend_code: newCode }).eq("id", currentUser.id);
  await loadFriendCode();
  alert("🔄 Kod znajomego został zmieniony!");
}

/* DODAWANIE / WYSYŁANIE ZAPROSZENIA */
async function addFriend(){
  const code = document.getElementById("addCodeInput").value.trim();
  const msg = document.getElementById("addMessage");
  msg.textContent = "";
  if(!code) return alert("Podaj kod znajomego.");

  const { data: friend } = await db.from("profiles").select("id,username").eq("friend_code", code).maybeSingle();
  if(!friend) return msg.textContent = "❌ Nie znaleziono użytkownika o tym kodzie.";
  if(friend.id === currentUser.id) return msg.textContent = "❌ Nie możesz dodać siebie.";

  // sprawdź czy już istnieje zaproszenie
  const { data: existing } = await db.from("friend_requests")
    .select("*")
    .or(`(sender_id.eq.${currentUser.id},receiver_id.eq.${friend.id})`)
    .or(`(sender_id.eq.${friend.id},receiver_id.eq.${currentUser.id})`)
    .maybeSingle();
  if(existing) return msg.textContent = "ℹ️ Zaproszenie już istnieje.";

  await db.from("friend_requests").insert([{ sender_id: currentUser.id, receiver_id: friend.id }]);
  msg.textContent = "✅ Wysłano zaproszenie do " + (friend.username || "użytkownika");
  document.getElementById("addCodeInput").value = "";
}

/* LISTA ZAPROSZEŃ */
async function loadRequests(){
  const { data } = await db.from("friend_requests")
    .select("id,sender_id,created_at,status,profiles!sender_id(username,friend_code)")
    .eq("receiver_id", currentUser.id)
    .eq("status", "pending");

  if(!data?.length){
    document.getElementById("requestsList").innerHTML = "<p class='muted'>Brak zaproszeń.</p>";
    return;
  }

  const html = data.map(r=>{
    return `
      <div class="friend-item">
        <div class="friend-info">
          <b>${r.profiles.username}</b>
          <span class="muted">Kod: ${r.profiles.friend_code}</span>
        </div>
        <div>
          <button class="btn" onclick="acceptRequest(${r.id}, '${r.sender_id}')">✅ Akceptuj</button>
          <button class="btn danger" onclick="rejectRequest(${r.id})">❌ Odrzuć</button>
        </div>
      </div>
    `;
  }).join("");
  document.getElementById("requestsList").innerHTML = html;
}

async function acceptRequest(requestId, senderId){
  await db.from("friend_requests").update({ status: "accepted" }).eq("id", requestId);
  await db.from("friends").insert([
    { user_id: currentUser.id, friend_id: senderId },
    { user_id: senderId, friend_id: currentUser.id }
  ]);
  await loadFriends();
  await loadRequests();
}

async function rejectRequest(requestId){
  await db.from("friend_requests").update({ status: "rejected" }).eq("id", requestId);
  await loadRequests();
}

/* LISTA ZNAJOMYCH */
async function loadFriends(){
  const { data } = await db.from("friends").select("friend_id,created_at").eq("user_id", currentUser.id);
  if(!data?.length) {
    document.getElementById("friendsList").innerHTML = "<p class='muted'>Brak znajomych.</p>";
    return;
  }

  const ids = data.map(f=>f.friend_id);
  const { data: profiles } = await db.from("profiles").select("id,username,friend_code,bio").in("id", ids);
  const map = new Map(profiles.map(p=>[p.id,p]));
  const html = data.map(f=>{
    const p = map.get(f.friend_id);
    const date = new Date(f.created_at);
    return `
      <div class="friend-item">
        <div class="friend-info">
          <b>${p?.username || "Nieznany"}</b>
          <span class="muted">Kod: ${p?.friend_code || "-"}</span>
          <span class="muted">Dodano: ${date.toLocaleDateString()} ${date.toLocaleTimeString()}</span>
        </div>
        <div>
          <button class="btn secondary" onclick="openProfile('${p?.id}')">👤 Profil</button>
        </div>
      </div>
    `;
  }).join("");
  document.getElementById("friendsList").innerHTML = html;
}

/* PROFIL ZNAJOMEGO */
function openProfile(id){
  location.href = "profil-znajomego.html?id=" + id;
}

/* WYLOGOWANIE */
async function logout(){ await db.auth.signOut(); location.href="login.html"; }
</script>
</body>
</html>
