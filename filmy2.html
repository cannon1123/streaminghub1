<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamingHub • Filmy</title>
  <style>
    :root{--bg:#0b0d10;--card:#151922;--text:#e3e7ee;--muted:#a8bfe2;--brand:#4f7cff;--border:#232a37}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto}
    a{color:var(--text);text-decoration:none}
    .container{max-width:1100px;margin:0 auto;padding:16px}
    header{position:sticky;top:0;background:rgba(11,13,16,.8);backdrop-filter:blur(6px);z-index:10}
    .nav{display:flex;gap:12px;align-items:center;padding:12px 16px}
    .brand{font-weight:800}
    .nav input[type=search]{flex:1;background:#0e1218;border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:12px}
    .menu a,.menu button{padding:8px 10px;color:var(--muted);background:none;border:none;cursor:pointer}
    .btn{background:var(--brand);color:#fff;padding:10px 14px;border-radius:12px;border:none;cursor:pointer}
    .btn.secondary{background:#2a3446}
    .badge{font-size:12px;color:#fff;background:#2a3446;padding:2px 8px;border-radius:999px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .card img{width:100%;height:200px;object-fit:cover;display:block}
    .small{font-size:12px;color:var(--muted)}
    .video-container{position:relative;width:100%;padding-bottom:56.25%;height:0;overflow:hidden;background:black;border-radius:22px}
    .video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
    footer{color:var(--muted);text-align:center;padding:30px 0}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;backdrop-filter:blur(10px);background:rgba(0,0,0,.6);display:flex;justify-content:center;align-items:center;z-index:9999}
    .modal{background:var(--card);color:var(--text);border-radius:16px;padding:24px;width:min(700px,90%);max-height:90vh;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,.5)}
    .modal-close{position:absolute;top:10px;right:20px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer}
    .history-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
    .history-item img{width:100%;height:180px;object-fit:cover}
    .history-content{padding:10px}
    .history-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:20px}
    .show-more{text-align:center;margin-top:16px}
  </style>
</head>
<body>
<header>
  <div class="nav container">
    <a class="brand" href="#" onclick="UI.show('home')">🎬 StreamingHub</a>
    <form onsubmit="event.preventDefault();UI.search(this.q.value)" style="flex:1">
      <input type="search" name="q" placeholder="Szukaj filmów…" />
    </form>
    <nav class="menu flex">
      <a href="#" onclick="UI.show('home')">Filmy</a>
      <a href="#" onclick="UI.show('history')">Historia</a>
      <a href="top.html">TOP</a>
      <form onsubmit="event.preventDefault();Auth.logout();window.location='login.html';">
        <button class="btn secondary">Wyloguj</button>
      </form>
    </nav>
  </div>
</header>

<main class="container" id="app"></main>
<footer>© <script>document.write(new Date().getFullYear())</script> StreamingHub</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "TWOJ_URL_SUPABASE";
const SUPABASE_KEY = "TWOJ_PUBLICZNY_ANON_KEY";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));}
function makeSlug(s){return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");}

async function Auth_currentUser(){const {data:{user}}=await db.auth.getUser();return user||null;}

async function getMovies(){const {data}=await db.from("movies").select("*").order("created_at",{ascending:false});return data||[];}
async function getMovie(id){const {data}=await db.from("movies").select("*").eq("id",id).single();return data;}
async function addWatch(userId,movieId){await db.from("watch_history").delete().eq("user_id",userId).eq("movie_id",movieId);await db.from("watch_history").insert({user_id:userId,movie_id:movieId});}
async function getWatchHistory(userId,limit=null){
  const {data}=await db.from("watch_history").select("movie_id,watched_at,movies(id,title,thumb)").eq("user_id",userId).order("watched_at",{ascending:false});
  if(!data)return [];
  const unique={};
  data.forEach(h=>{if(!unique[h.movie_id])unique[h.movie_id]=h;});
  const list=Object.values(unique);
  return limit?list.slice(0,limit):list;
}

const UI={
  el:()=>document.getElementById("app"),
  async show(view){
    const app=UI.el();
    const me=await Auth_currentUser();
    if(!me)return app.innerHTML="<h2>Zaloguj się, aby korzystać z serwisu</h2>";

    if(view==="home"){
      const movies=await getMovies();
      app.innerHTML=`<h2>Nowe filmy</h2><div class="grid">${movies.map(UI.card).join("")}</div>`;
    }

    if(view==="history"){
      const history=await getWatchHistory(me.id,6);
      if(!history.length){app.innerHTML="<h2>Brak historii oglądania</h2>";return;}
      app.innerHTML=`
        <h2>Historia oglądania</h2>
        <div id="historyGrid" class="history-grid">${history.map(UI.historyItem).join("")}</div>
        <div class="show-more"><button class="btn" onclick="UI.showMoreHistory()">Pokaż więcej</button></div>`;
    }
  },
  card(m){const slug=makeSlug(m.title);return `<div class="card"><a href="#${slug}"><img src="${m.thumb}" alt="${escapeHtml(m.title)}"></a><div style="padding:10px;"><b>${escapeHtml(m.title)}</b></div></div>`;},
  historyItem(h){
    const slug=makeSlug(h.movies.title);
    const date=new Date(h.watched_at).toLocaleString("pl-PL",{dateStyle:"short",timeStyle:"short"});
    return `<div class="history-item">
      <img src="${h.movies.thumb}" alt="${escapeHtml(h.movies.title)}">
      <div class="history-content">
        <div><b>${escapeHtml(h.movies.title)}</b></div>
        <div class="small">Ostatnio: ${date}</div>
        <button class="btn secondary mt-2" onclick="location.hash='${slug}/access_unlocked'">Kontynuuj oglądanie</button>
      </div>
    </div>`;
  },
  async showMoreHistory(){
    const me=await Auth_currentUser();
    const all=await getWatchHistory(me.id);
    document.getElementById("historyGrid").innerHTML=all.map(UI.historyItem).join("");
    document.querySelector(".show-more").remove();
  }
};

window.addEventListener("DOMContentLoaded",()=>UI.show("home"));
window.addEventListener("hashchange",handleHash);

async function handleHash(){
  const hash=location.hash.slice(1);
  if(!hash)return;
  const me=await Auth_currentUser();
  const parts=hash.split("/");
  const slug=parts[0];
  const mode=parts[1]||null;
  const movies=await getMovies();
  const movie=movies.find(m=>makeSlug(m.title)===slug);
  if(!movie)return;
  if(mode==="access_unlocked"){
    await addWatch(me.id,movie.id);
    document.getElementById("app").innerHTML=`
      <div class="video-container"><iframe src="${movie.iframe}" allowfullscreen></iframe></div>
      <div style="margin-top:12px;"><button class="btn secondary" onclick="UI.show('home')">← Powrót</button></div>`;
  }else{
    openMovieModal(movie);
  }
}

function openMovieModal(m){
  document.querySelectorAll(".modal-overlay").forEach(e=>e.remove());
  const modal=document.createElement("div");
  modal.className="modal-overlay";
  modal.innerHTML=`
    <div class="modal">
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button>
      <h2>${escapeHtml(m.title)}</h2>
      <img src="${m.thumb}" style="width:100%;border-radius:12px;margin-top:8px">
      <p>${escapeHtml(m.description||"")}</p>
      <button class="btn" onclick="location.hash='${makeSlug(m.title)}/access_unlocked'">Oglądaj</button>
    </div>`;
  document.body.appendChild(modal);
}
</script>
</body>
</html>
