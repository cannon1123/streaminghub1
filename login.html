<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamingHub • Logowanie</title>
  <style>
    body {
      margin:0; font-family:system-ui, sans-serif;
      background:#0b0d10; color:#e3e7ee; display:flex; align-items:center; justify-content:center;
      min-height:100vh;
    }
    .auth-box {
      background:#151922; padding:30px 40px; border-radius:16px; width:100%; max-width:400px;
      box-shadow:0 0 25px rgba(0,0,0,.4);
    }
    h2 { text-align:center; margin-bottom:25px; }
    label { display:block; font-size:.9rem; color:#9fb1d9; margin-bottom:6px; }
    input { width:100%; background:#0e1218; border:1px solid #232a37; color:#fff;
      padding:10px 12px; border-radius:10px; margin-bottom:14px;
    }
    button {
      width:100%; background:#4f7cff; color:#fff; border:none;
      padding:10px 16px; border-radius:12px; cursor:pointer;
      font-weight:600; margin-top:4px; transition:background .2s;
    }
    button:hover { background:#668cff; }
    .switch { text-align:center; margin-top:10px; color:#9fb1d9; cursor:pointer; font-size:.9rem; }
    .switch:hover { color:#fff; }
    .captcha {
      display:flex; align-items:center; justify-content:space-between;
      background:#0e1218; padding:8px 12px; border:1px solid #232a37; border-radius:10px; margin-bottom:12px;
      user-select:none;
    }
    .captcha span { font-family:monospace; font-size:1rem; letter-spacing:2px; }
    small.link { display:block; text-align:center; margin-top:12px; font-size:.8rem; color:#9fb1d9; cursor:pointer; }
    small.link:hover { color:#fff; text-decoration:underline; }
  </style>
</head>
<body>

<div class="auth-box" id="authBox">
  <h2 id="formTitle">Zaloguj się</h2>

  <div id="loginForm">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="twój@email.com" />
    <label>Hasło</label>
    <input type="password" id="loginPass" placeholder="••••••••" />
    <button onclick="login()">Zaloguj się</button>
    <small class="link" onclick="showReset()">Zapomniałeś hasła?</small>
    <small class="link" onclick="showRegister()">Nie masz konta? Zarejestruj się</small>
    <small class="link" onclick="sendMagicLink()">Zaloguj się magicznym linkiem ✨</small>
  </div>

  <div id="registerForm" style="display:none;">
    <label>Nazwa użytkownika</label>
    <input type="text" id="regName" placeholder="np. Janek123" />
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="twój@email.com" />
    <label>Hasło</label>
    <input type="password" id="regPass" placeholder="••••••••" />
    <label>Powtórz hasło</label>
    <input type="password" id="regPass2" placeholder="••••••••" />
    <div class="captcha">
      <span id="captchaText"></span>
      <input type="text" id="captchaInput" placeholder="Przepisz" style="width:100px;">
    </div>
    <button onclick="register()">Utwórz konto</button>
    <small class="link" onclick="showLogin()">Masz już konto? Zaloguj się</small>
  </div>

  <div id="resetForm" style="display:none;">
    <label>Podaj email</label>
    <input type="email" id="resetEmail" placeholder="twój@email.com" />
    <button onclick="resetPassword()">Wyślij link do resetu</button>
    <small class="link" onclick="showLogin()">Wróć do logowania</small>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://jjmnacolebxsifmnmqks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpqbW5hY29sZWJ4c2lmbW5tcWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU3OTcyNDQsImV4cCI6MjA3MTM3MzI0NH0.1hNoBQ4wDuA_t_vscorQ6FRb-aW8IxHEDxuZKEhndv0";
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ---------- Formularze ---------- */
function showLogin(){ hideAll(); document.getElementById("formTitle").innerText="Zaloguj się"; document.getElementById("loginForm").style.display="block";}
function showRegister(){ hideAll(); generateCaptcha(); document.getElementById("formTitle").innerText="Zarejestruj się"; document.getElementById("registerForm").style.display="block";}
function showReset(){ hideAll(); document.getElementById("formTitle").innerText="Reset hasła"; document.getElementById("resetForm").style.display="block";}
function hideAll(){ ["loginForm","registerForm","resetForm"].forEach(id=>document.getElementById(id).style.display="none"); }

/* ---------- Captcha ---------- */
function generateCaptcha(){
  const code = Math.random().toString(36).substring(2,8).toUpperCase();
  document.getElementById("captchaText").textContent = code;
  document.getElementById("captchaText").dataset.value = code;
}

/* ---------- Rejestracja ---------- */
async function register(){
  const name = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pass = document.getElementById("regPass").value;
  const pass2 = document.getElementById("regPass2").value;
  const captcha = document.getElementById("captchaInput").value.trim().toUpperCase();
  const correct = document.getElementById("captchaText").dataset.value;

  if(!name || !email || !pass){alert("Uzupełnij wszystkie pola!");return;}
  if(pass !== pass2){alert("Hasła nie są identyczne!");return;}
  if(captcha !== correct){alert("Captcha niepoprawna!");generateCaptcha();return;}

  const { data, error } = await db.auth.signUp({
    email,
    password: pass,
    options: { data: { username: name } }
  });
  if(error){alert("Błąd: "+error.message);}
  else { alert("Sprawdź maila i potwierdź rejestrację!"); showLogin(); }
}

/* ---------- Logowanie ---------- */
async function login(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass = document.getElementById("loginPass").value;
  if(!email||!pass){alert("Podaj dane logowania!");return;}
  const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
  if(error){alert("Błąd: "+error.message);}
  else { location.href = "seriale.html"; }
}

/* ---------- Magic Link ---------- */
async function sendMagicLink(){
  const email = prompt("Podaj swój email do wysłania magicznego linku:");
  if(!email) return;
  const { error } = await db.auth.signInWithOtp({ email });
  if(error){alert("Błąd: "+error.message);}
  else alert("Sprawdź skrzynkę! Magic link został wysłany.");
}

/* ---------- Reset hasła ---------- */
async function resetPassword(){
  const email = document.getElementById("resetEmail").value.trim();
  if(!email){alert("Podaj adres e-mail!");return;}
  const { error } = await db.auth.resetPasswordForEmail(email);
  if(error){alert("Błąd: "+error.message);}
  else alert("Wysłano link do resetu hasła. Sprawdź pocztę!");
}

generateCaptcha();
</script>
</body>
</html>
